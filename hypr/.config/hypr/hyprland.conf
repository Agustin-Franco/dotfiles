#NVIDIA  https://wiki.hypr.land/Nvidia/
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

#Electron Apps native wayland support 
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Source 
source = ~/.config/hypr/plugins/split-monitor.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/monitors.conf




#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

 exec-once = nm-applet &
 exec-once = waybar
 exec-once = hyprpaper
 exec-once = ~/.config/hypr/wallpaper-rotator.sh

 

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,22
env = HYPRCURSOR_SIZE,22



# Variables
$activeBorderColor = rgba(33ccffee) rgba(00ff99ee) 45deg
$inactiveBorderColor = rgba(595959aa)


