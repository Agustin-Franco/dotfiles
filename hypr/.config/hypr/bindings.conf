################
### PROGRAMS ###
################

$terminal = alacritty
$fileManager = nautilus
$menu = wofi
$browser = firefox
$music = spotify-launcher
$code = vscodium

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

#############
# LAUNCHER #
#############

bind = $mainMod, T, exec, $terminal
bind = $mainMod, SPACE, exec, $menu    
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, M, exec, $music
bind = $mainMod, N, exec, $code

######################
# WINDOW MANAGEMENT  #
######################

# Close and toggle
bind = $mainMod, W, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, I, layoutmsg, togglesplit

# Fullscreen
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0

# Groups
bind = $mainMod, G, togglegroup
bind = $mainMod ALT, G, moveoutofgroup

###################
# FOCUS & MOVE    #
###################

# Move focus with SUPER + hjkl
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move window with SUPER SHIFT + hjkl
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Swap window with SUPER SHIFT ALT + hjkl
bind = $mainMod SHIFT ALT, h, swapwindow, l
bind = $mainMod SHIFT ALT, l, swapwindow, r
bind = $mainMod SHIFT ALT, k, swapwindow, u
bind = $mainMod SHIFT ALT, j, swapwindow, d

# Resize window with SUPER CTRL + hjkl
bind = $mainMod CTRL, h, resizeactive, -100 0
bind = $mainMod CTRL, l, resizeactive, 100 0
bind = $mainMod CTRL, k, resizeactive, 0 -100
bind = $mainMod CTRL, j, resizeactive, 0 100

###################
# WORKSPACES      #
###################

# Switch workspaces with ALT + [1-0] (split-monitor-workspaces)
bind = ALT, 1, split-workspace, 1
bind = ALT, 2, split-workspace, 2
bind = ALT, 3, split-workspace, 3
bind = ALT, 4, split-workspace, 4
bind = ALT, 5, split-workspace, 5
bind = ALT, 6, split-workspace, 6
bind = ALT, 7, split-workspace, 7
bind = ALT, 8, split-workspace, 8
bind = ALT, 9, split-workspace, 9
bind = ALT, 0, split-workspace, 10

# Move window to workspace with ALT SHIFT + [1-0]
bind = ALT SHIFT, 1, split-movetoworkspacesilent, 1
bind = ALT SHIFT, 2, split-movetoworkspacesilent, 2
bind = ALT SHIFT, 3, split-movetoworkspacesilent, 3
bind = ALT SHIFT, 4, split-movetoworkspacesilent, 4
bind = ALT SHIFT, 5, split-movetoworkspacesilent, 5
bind = ALT SHIFT, 6, split-movetoworkspacesilent, 6
bind = ALT SHIFT, 7, split-movetoworkspacesilent, 7
bind = ALT SHIFT, 8, split-movetoworkspacesilent, 8
bind = ALT SHIFT, 9, split-movetoworkspacesilent, 9
bind = ALT SHIFT, 0, split-movetoworkspacesilent, 10

# Cycle forward through workspaces (like Alt+Tab)
bind = ALT, TAB, split-cycleworkspaces, +1

# Cycle backward through workspaces
bind = ALT SHIFT, TAB, split-cycleworkspaces, -1

# Switch between windows in a group with SHFIT + arrow keys 
bind = SHIFT, left, changegroupactive, b   # backward (previous window)
bind = SHIFT, right, changegroupactive, f  # forward (next window)

#Screenshot 
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/screenshot.sh

# Lock screen
bind = $mainMod, Y, exec, hyprlock -c ~/.config/hypr/hyprlock.conf

###################
# MOUSE           #
###################

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Scroll through workspaces (split-monitor-workspaces)
bind = $mainMod, mouse_down, split-workspace, e+1
bind = $mainMod, mouse_up, split-workspace, e-1

###################
# MEDIA KEYS      #
###################

# Volume control
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness control
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Player control (requires playerctl)
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous


