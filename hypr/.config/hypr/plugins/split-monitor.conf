# hyprpm add https://github.com/zjeffer/split-monitor-workspaces # Add the plugin repository
# hyprpm enable split-monitor-workspaces # Enable the plugin
# hyprpm reload # Reload the plugins
# Add the following in your hyprland.conf file to automatically load the plugin at startup: exec-once = hyprpm reload -n
# https://github.com/zjeffer/split-monitor-workspaces

exec-once = hyprpm reload -n

plugin {
    split-monitor-workspaces {
        count = 15
        keep_focused = 1
        enable_notifications = 0
        enable_persistent_workspaces = 1

        # set this to 1 for gnome-like workspace switching
        link_monitors = 1

        monitor_priority = DP-2, HDMI-A-1, DP-1

        # you can also set max workspaces per monitor
        max_workspaces = DP-2, 5
        max_workspaces = DP-1, 5
	max_workspaces = HDMI-A-1, 5

    }
}
