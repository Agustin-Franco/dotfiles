<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="font">
    <test name="family" compare="contains">
      <string>JetBrains</string>
    </test>
    <edit name="fontfeatures" mode="append">
      <string>liga=0</string>
    </edit>
  </match>
</fontconfig>